name: Build Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t prism-backend:latest ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://172.25.47.101:9440 \
            -t prism-frontend:latest \
            ./frontend

      - name: Save images to tar files
        run: |
          docker save prism-backend:latest | gzip > prism-backend.tar.gz
          docker save prism-frontend:latest | gzip > prism-frontend.tar.gz

      - name: Upload backend image
        uses: actions/upload-artifact@v4
        with:
          name: prism-backend
          path: prism-backend.tar.gz
          retention-days: 7

      - name: Upload frontend image
        uses: actions/upload-artifact@v4
        with:
          name: prism-frontend
          path: prism-frontend.tar.gz
          retention-days: 7

name: Build Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t prism-backend:latest ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://172.25.47.101:9440 \
            -t prism-frontend:latest \
            ./frontend

      - name: Pull infrastructure images
        run: |
          docker pull postgres:16-alpine
          docker pull redis:7-alpine
          docker pull minio/minio:latest
          docker pull nginx:alpine

      - name: Save all images to tar files
        run: |
          docker save prism-backend:latest   | gzip > prism-backend.tar.gz
          docker save prism-frontend:latest  | gzip > prism-frontend.tar.gz
          docker save postgres:16-alpine     | gzip > postgres.tar.gz
          docker save redis:7-alpine         | gzip > redis.tar.gz
          docker save minio/minio:latest     | gzip > minio.tar.gz
          docker save nginx:alpine           | gzip > nginx.tar.gz

      - name: Upload app images
        uses: actions/upload-artifact@v4
        with:
          name: prism-app-images
          path: |
            prism-backend.tar.gz
            prism-frontend.tar.gz
          retention-days: 7

      - name: Upload infrastructure images
        uses: actions/upload-artifact@v4
        with:
          name: prism-infra-images
          path: |
            postgres.tar.gz
            redis.tar.gz
            minio.tar.gz
            nginx.tar.gz
          retention-days: 7

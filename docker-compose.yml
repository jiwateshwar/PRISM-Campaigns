version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: prism_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prism}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prism_secret}
      POSTGRES_DB: ${POSTGRES_DB:-prism_campaigns}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prism} -d ${POSTGRES_DB:-prism_campaigns}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prism_net

  # ─────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: prism_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prism_net

  # ─────────────────────────────────────────────
  # MinIO Object Storage
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: prism_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-prism_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret_key}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - prism_net

  # ─────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prism_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD:-prism_secret}@db:5432/${POSTGRES_DB:-prism_campaigns}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD:-prism_secret}@db:5432/${POSTGRES_DB:-prism_campaigns}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-32-chars-min}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-prism_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_secret_key}
      MINIO_BUCKET: ${MINIO_BUCKET:-prism-creatives}
      FIRST_SUPERUSER_EMAIL: ${FIRST_SUPERUSER_EMAIL:-admin@prism.local}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD:-Admin@123456}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - prism_net

  # ─────────────────────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: prism_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-nextauth-secret}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - prism_net

  # ─────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: prism_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - prism_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  prism_net:
    driver: bridge
